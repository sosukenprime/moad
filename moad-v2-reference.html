// ------------------------------------------------------------------
// Event listeners
// ------------------------------------------------------------------
function attachListeners() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const action = el.dataset.action;
      const id = el.dataset.id;
      if (action === 'toggle-task') toggleTask(id, e);
      else if (action === 'delete-task') { e.stopPropagation(); deleteTask(id); }
      else if (action === 'edit-task') { e.stopPropagation(); openEditTaskModal(id); }
      else if (action === 'edit-project') { if (!editMode) openEditProjectModal(id); }
      else if (action === 'toggle-habit') toggleHabit(id, e);
      else if (action === 'delete-idea') deleteItem('ideas', id);
      else if (action === 'delete-sidequest') deleteItem('sideQuests', id);
      else if (action === 'settings') openSettingsModal();
      else if (action === 'toggle-edit') toggleEditMode();
      else if (action === 'done-edit') toggleEditMode();
      else if (action === 'toggle-focus') toggleFocusMode();
      else if (action === 'help') openHelpModal();
      else if (action === 'view-archive') openArchiveModal();
      else if (action === 'toggle-subtask') toggleSubtask(el.dataset.taskId, el.dataset.subtaskId);
      else if (action === 'delete-subtask') { e.stopPropagation(); deleteSubtask(el.dataset.taskId, el.dataset.subtaskId); }
    });
  });

  document.querySelectorAll('[data-widget-action]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const action = el.dataset.widgetAction;
      const id = el.dataset.widgetId;
      if (action === 'move-up') moveWidget(id, -1);
      else if (action === 'move-down') moveWidget(id, 1);
      else if (action === 'toggle-size') toggleWidgetSize(id);
    });
  });

  document.querySelectorAll('[data-add]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      if (editMode) return;
      openAddModal(el.dataset.add);
    });
  });

  // Scratchpad
  const input = document.getElementById('ideaInput');
  if (input) {
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        const text = input.value.trim();
        if (text) {
          state.ideas.push({ id: genId(), text, createdAt: now() });
          saveState();
          renderAll();
        }
      }
    });
  }

  // Subtask add inputs
  document.querySelectorAll('[data-subtask-add-input]').forEach(inp => {
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const text = inp.value.trim();
        if (text) {
          addSubtask(inp.dataset.taskId, text);
        }
      }
    });
    inp.addEventListener('click', e => e.stopPropagation());
  });
}

// ------------------------------------------------------------------
// Widget reorder (edit mode)
// ------------------------------------------------------------------
function toggleEditMode() { editMode = !editMode; renderAll(); }

function moveWidget(id, direction) {
  const idx = state.layout.findIndex(w => w.id === id);
  if (idx === -1) return;
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= state.layout.length) return;
  const [item] = state.layout.splice(idx, 1);
  state.layout.splice(newIdx, 0, item);
  saveState();
  renderAll();
}

function toggleWidgetSize(id) {
  const w = state.layout.find(w => w.id === id);
  if (!w) return;
  w.size = w.size === 'half' ? 'full' : 'half';
  saveState();
  renderAll();
}

function attachDragHandlers() {
  const grid = document.getElementById('widgetsGrid');
  if (!grid) return;
  const wrappers = grid.querySelectorAll('.widget-wrapper');
  wrappers.forEach(el => {
    el.addEventListener('dragstart', (e) => {
      dragState = el.dataset.widgetId;
      el.classList.add('dragging');
      if (e.dataTransfer) { e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', el.dataset.widgetId); }
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      wrappers.forEach(w => w.classList.remove('drag-over'));
      dragState = null;
    });
    el.addEventListener('dragover', (e) => {
      e.preventDefault();
      if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
      if (dragState && dragState !== el.dataset.widgetId) {
        wrappers.forEach(w => w.classList.remove('drag-over'));
        el.classList.add('drag-over');
      }
    });
    el.addEventListener('dragleave', (e) => {
      if (!el.contains(e.relatedTarget)) el.classList.remove('drag-over');
    });
    el.addEventListener('drop', (e) => {
      e.preventDefault();
      el.classList.remove('drag-over');
      const sourceId = dragState, targetId = el.dataset.widgetId;
      if (!sourceId || !targetId || sourceId === targetId) return;
      const sourceIdx = state.layout.findIndex(w => w.id === sourceId);
      const targetIdx = state.layout.findIndex(w => w.id === targetId);
      if (sourceIdx === -1 || targetIdx === -1) return;
      const [item] = state.layout.splice(sourceIdx, 1);
      state.layout.splice(targetIdx, 0, item);
      saveState();
      renderAll();
    });
  });
}

// ------------------------------------------------------------------
// Task drag-to-reorder (within Today)
// ------------------------------------------------------------------
function attachTaskDragHandlers() {
  if (editMode) return;
  const tasks = document.querySelectorAll('[data-task-id]');
  tasks.forEach(el => {
    el.addEventListener('dragstart', (e) => {
      // Only drag from the drag handle area or when shift-held? Simpler: just allow
      // But we should not drag if user is tapping the check, edit, delete, or subtask
      const target = e.target;
      if (target.closest('.task-check, .task-actions, .subtask, .subtask-add-input, .task-action-btn')) {
        e.preventDefault();
        return;
      }
      taskDragState = el.dataset.taskId;
      el.classList.add('dragging');
      if (e.dataTransfer) {
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', el.dataset.taskId);
      }
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      tasks.forEach(t => { t.classList.remove('drag-over-top'); t.classList.remove('drag-over-bottom'); });
      taskDragState = null;
    });
    el.addEventListener('dragover', (e) => {
      if (!taskDragState || taskDragState === el.dataset.taskId) return;
      e.preventDefault();
      if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
      const rect = el.getBoundingClientRect();
      const midpoint = rect.top + rect.height / 2;
      tasks.forEach(t => { t.classList.remove('drag-over-top'); t.classList.remove('drag-over-bottom'); });
      if (e.clientY < midpoint) el.classList.add('drag-over-top');
      else el.classList.add('drag-over-bottom');
    });
    el.addEventListener('dragleave', () => {
      el.classList.remove('drag-over-top');
      el.classList.remove('drag-over-bottom');
    });
    el.addEventListener('drop', (e) => {
      e.preventDefault();
      const sourceId = taskDragState;
      const targetId = el.dataset.taskId;
      if (!sourceId || !targetId || sourceId === targetId) return;
      const rect = el.getBoundingClientRect();
      const dropBefore = e.clientY < rect.top + rect.height / 2;
      reorderTask(sourceId, targetId, dropBefore);
    });
  });
}

function reorderTask(sourceId, targetId, dropBefore) {
  const source = state.tasks.find(t => t.id === sourceId);
  const target = state.tasks.find(t => t.id === targetId);
  if (!source || !target) return;
  // Reorder within all tasks by reassigning `order`
  const visibleTasks = state.tasks.filter(t =>
    !t.dueDate || t.dueDate === today() || (parseDate(t.dueDate) < parseDate(today()) && !t.completed)
  );
  // Build new order list
  let newOrder = visibleTasks.filter(t => t.id !== sourceId);
  const targetIdx = newOrder.findIndex(t => t.id === targetId);
  if (targetIdx === -1) return;
  newOrder.splice(dropBefore ? targetIdx : targetIdx + 1, 0, source);
  newOrder.forEach((t, i) => t.order = i);
  saveState();
  renderAll();
}

// ------------------------------------------------------------------
// Modal system
// ------------------------------------------------------------------
function openAddModal(type) {
  const modal = document.getElementById('modal');
  const overlay = document.getElementById('modalOverlay');
  closeFab();
  let html = '';
  if (type === 'task') html = taskFormHtml(null);
  else if (type === 'project') html = projectFormHtml(null);
  else if (type === 'habit') html = habitFormHtml();
  else if (type === 'deadline') html = deadlineFormHtml();
  else if (type === 'sidequest') html = sideQuestFormHtml();

  modal.innerHTML = html;
  overlay.classList.add('open');
  setTimeout(() => {
    const first = modal.querySelector('input, textarea, select');
    if (first) first.focus();
  }, 100);

  modal.querySelector('[data-cancel]')?.addEventListener('click', closeModal);
  modal.querySelector('[data-save]')?.addEventListener('click', () => saveFromModal(type, null));
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
  attachTagInputHandlers(modal);
  attachFormEnterToSubmit(modal, () => saveFromModal(type, null));
}

function openEditTaskModal(id) {
  const t = state.tasks.find(x => x.id === id);
  if (!t) return;
  const modal = document.getElementById('modal');
  const overlay = document.getElementById('modalOverlay');
  modal.innerHTML = taskFormHtml(t);
  overlay.classList.add('open');
  setTimeout(() => modal.querySelector('#f_text')?.focus(), 100);
  modal.querySelector('[data-cancel]')?.addEventListener('click', closeModal);
  modal.querySelector('[data-save]')?.addEventListener('click', () => saveFromModal('task', id));
  modal.querySelector('[data-delete]')?.addEventListener('click', () => {
    if (confirm('Delete this task?')) { deleteTask(id); closeModal(); }
  });
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
  attachTagInputHandlers(modal);
  attachFormEnterToSubmit(modal, () => saveFromModal('task', id));
}

function openEditProjectModal(id) {
  const p = state.projects.find(x => x.id === id);
  if (!p) return;
  const modal = document.getElementById('modal');
  const overlay = document.getElementById('modalOverlay');
  modal.innerHTML = projectFormHtml(p);
  overlay.classList.add('open');
  setTimeout(() => modal.querySelector('#f_name')?.focus(), 100);
  modal.querySelector('[data-cancel]')?.addEventListener('click', closeModal);
  modal.querySelector('[data-save]')?.addEventListener('click', () => saveFromModal('project', id));
  modal.querySelector('[data-delete]')?.addEventListener('click', () => {
    if (confirm('Delete this mission?')) {
      state.projects = state.projects.filter(x => x.id !== id);
      saveState(); closeModal(); renderAll();
    }
  });
  modal.querySelector('[data-archive]')?.addEventListener('click', () => {
    archiveProject(id); closeModal();
  });
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
  attachTagInputHandlers(modal);
  attachFormEnterToSubmit(modal, () => saveFromModal('project', id));
}

function attachTagInputHandlers(modal) {
  modal.querySelectorAll('[data-tag-input]').forEach(inp => {
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ',' || e.key === ' ') {
        const val = inp.value.trim().replace(/^#/, '');
        if (val && val.length <= 30) {
          e.preventDefault();
          const wrap = inp.closest('.tag-input-wrap');
          // Check if already exists
          const existing = [...wrap.querySelectorAll('[data-tag]')].map(el => el.dataset.tag);
          if (!existing.includes(val)) {
            const chip = document.createElement('span');
            chip.className = 'tag-chip';
            chip.dataset.tag = val;
            chip.innerHTML = `#${escapeHtml(val)} <span class="tag-chip-x" data-tag-remove="${escapeHtml(val)}">×</span>`;
            wrap.insertBefore(chip, inp);
            chip.querySelector('[data-tag-remove]').addEventListener('click', () => chip.remove());
          }
          inp.value = '';
        }
      }
    });
  });
  modal.querySelectorAll('[data-tag-remove]').forEach(x => {
    x.addEventListener('click', () => x.closest('.tag-chip').remove());
  });
}

function readTagsFromModal(modal, inputId) {
  const wrap = modal.querySelector(`[data-tag-wrap="${inputId}"]`);
  if (!wrap) return [];
  return [...wrap.querySelectorAll('[data-tag]')].map(el => el.dataset.tag);
}

function saveFromModal(type, editId) {
  const modal = document.getElementById('modal');
  if (type === 'task') {
    const text = modal.querySelector('#f_text').value.trim();
    if (!text) return;
    const priority = modal.querySelector('#f_priority').value;
    const xpMap = { low: 5, medium: 10, high: 20 };
    const tags = readTagsFromModal(modal, 'f_tags');
    const recurring = modal.querySelector('#f_recurring').value || null;
    const projectId = modal.querySelector('#f_project').value || null;
    const dueDate = modal.querySelector('#f_due').value || null;

    if (editId) {
      const t = state.tasks.find(x => x.id === editId);
      if (t) {
        t.text = text; t.priority = priority; t.xpValue = xpMap[priority];
        t.tags = tags; t.recurring = recurring; t.projectId = projectId; t.dueDate = dueDate;
      }
    } else {
      const maxOrder = Math.max(-1, ...state.tasks.map(x => x.order || 0));
      state.tasks.push({
        id: genId(), text, projectId, priority, dueDate,
        completed: false, completedAt: null, xpValue: xpMap[priority],
        tags, subtasks: [], recurring,
        order: maxOrder + 1, createdAt: now(),
      });
    }
  } else if (type === 'project') {
    const name = modal.querySelector('#f_name').value.trim();
    if (!name) return;
    const tags = readTagsFromModal(modal, 'f_tags');
    const data = {
      name,
      domain: modal.querySelector('#f_domain').value,
      progress: parseInt(modal.querySelector('#f_progress').value) || 0,
      nextAction: modal.querySelector('#f_next').value.trim(),
      deadline: modal.querySelector('#f_deadline').value || null,
      notes: modal.querySelector('#f_notes').value.trim(),
      tags,
    };
    if (editId) {
      const p = state.projects.find(x => x.id === editId);
      if (p) Object.assign(p, data);
    } else {
      state.projects.push({
        id: genId(), ...data, status: 'active', createdAt: now(),
      });
    }
  } else if (type === 'habit') {
    const name = modal.querySelector('#f_name').value.trim();
    if (!name) return;
    state.habits.push({ id: genId(), name, streak: 0, lastCompleted: null, history: [], createdAt: now() });
  } else if (type === 'deadline') {
    const title = modal.querySelector('#f_title').value.trim();
    const date = modal.querySelector('#f_date').value;
    if (!title || !date) return;
    if (!state.deadlines) state.deadlines = [];
    state.deadlines.push({ id: genId(), title, date, note: modal.querySelector('#f_note').value.trim(), createdAt: now() });
  } else if (type === 'sidequest') {
    const text = modal.querySelector('#f_text').value.trim();
    if (!text) return;
    state.sideQuests.push({ id: genId(), text, note: modal.querySelector('#f_note').value.trim(), createdAt: now() });
  }
  saveState();
  closeModal();
  renderAll();
}

function exportData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `moad-backup-${today()}.json`; a.click();
  URL.revokeObjectURL(url);
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (confirm('Import this data? Your current data will be REPLACED.')) {
        state = imported;
        saveState(); closeModal(); renderAll();
      }
    } catch (err) { alert('Invalid JSON file.'); }
  };
  reader.readAsText(file);
}

function resetLayout() {
  state.layout = structuredClone(DEFAULT_LAYOUT);
  saveState(); closeModal(); renderAll();
}

function resetData() {
  if (confirm('DELETE ALL DATA? This cannot be undone.')) {
    if (confirm('Really sure? Everything will be erased.')) {
      state = structuredClone(DEFAULT_STATE);
      state.initialized = true;
      saveState(); closeModal(); renderAll();
    }
  }
}

// Keyboard shortcuts
// ------------------------------------------------------------------
function initKeyboardShortcuts() {
  document.addEventListener('keydown', (e) => {
    // Don't trigger shortcuts when typing in inputs
    if (e.target.matches('input, textarea, select, [contenteditable]')) {
      if (e.key === 'Escape') {
        e.target.blur();
      }
      return;
    }
    if (e.key === 'Escape') {
      if (document.getElementById('modalOverlay').classList.contains('open')) closeModal();
      else if (editMode) toggleEditMode();
      else closeFab();
    } else if (e.key === 'n' || e.key === 'N') {
      if (!document.getElementById('modalOverlay').classList.contains('open')) {
        e.preventDefault();
        openAddModal('task');
      }
    } else if (e.key === 'e' || e.key === 'E') {
      if (!document.getElementById('modalOverlay').classList.contains('open')) {
        e.preventDefault();
        toggleEditMode();
      }
    } else if (e.key === 'f' || e.key === 'F') {
      if (!document.getElementById('modalOverlay').classList.contains('open')) {
        e.preventDefault();
        toggleFocusMode();
      }
    } else if (e.key === '?') {
      if (!document.getElementById('modalOverlay').classList.contains('open')) {
        e.preventDefault();
        openHelpModal();
      }
    }
  });
}

async function init() {
  const hadState = await loadState();
  if (!hadState || !state.initialized) {
    state = structuredClone(SEED_STATE);
    state.initialized = true;
  }
  checkStreak();
  await saveState();
  renderAll();
  initFab();
  initKeyboardShortcuts();

  // First-time name setup (only if totally fresh)
  if (!state.user.name && state.user.totalTasksCompleted === 0 && state.user.totalXp === 0) {
    setTimeout(() => openNameSetup(), 400);
  }
}

init();
</script>

</body>
</html>
